name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: appscale

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --package appscale-cli --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "staging/${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "staging/${ARCHIVE_NAME}/"
          cp README.md LICENSE* USAGE_GUIDE.md "staging/${ARCHIVE_NAME}/" 2>/dev/null || true
          cd staging
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=staging/${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archiveName = "${env:BINARY_NAME}-${env:GITHUB_REF_NAME}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "staging\${archiveName}"
          Copy-Item "target\${{ matrix.target }}\release\${env:BINARY_NAME}.exe" "staging\${archiveName}\"
          Copy-Item "README.md" "staging\${archiveName}\" -ErrorAction SilentlyContinue
          Compress-Archive -Path "staging\${archiveName}" -DestinationPath "staging\${archiveName}.zip"
          echo "ASSET=staging\${archiveName}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "ASSET_NAME=${archiveName}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate SHA256
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            shasum -a 256 "$ASSET" | awk '{print $1}' > "${ASSET}.sha256"
          else
            sha256sum "$ASSET" | awk '{print $1}' > "${ASSET}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish appscale-core
        run: cargo publish --package appscale-core --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish appscale-cli
        run: |
          sleep 30  # Wait for crates.io to index appscale-core
          cargo publish --package appscale-cli --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: aarch64-apple-darwin
          path: artifacts/arm64

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: x86_64-apple-darwin
          path: artifacts/x86_64

      - name: Get checksums
        id: checksums
        run: |
          ARM64_SHA=$(cat artifacts/arm64/*.sha256)
          X86_64_SHA=$(cat artifacts/x86_64/*.sha256)
          VERSION=${GITHUB_REF_NAME#v}
          echo "arm64_sha=${ARM64_SHA}" >> $GITHUB_OUTPUT
          echo "x86_64_sha=${X86_64_SHA}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: subham11/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ steps.checksums.outputs.version }}",
              "arm64_sha": "${{ steps.checksums.outputs.arm64_sha }}",
              "x86_64_sha": "${{ steps.checksums.outputs.x86_64_sha }}"
            }
